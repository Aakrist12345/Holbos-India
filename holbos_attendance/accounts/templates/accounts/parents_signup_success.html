<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holbos ERP — Parent Account Details</title>
  <link rel="icon" type="image/png" href="{% static 'images/holbosLOGO.png' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #D4208A;
      --primary-hover: #8B2FC9;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 1rem;
    }

    .logo-title {
      font-family: 'Yatra One', cursive;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #D4208A 0%, #3B2FC9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .success-icon {
      color: var(--success);
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .details-box {
      background: #f1f5f9;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      text-align: left;
    }

    .detail-item {
      margin-bottom: 1rem;
    }

    .detail-item:last-child {
      margin-bottom: 0;
    }

    .detail-label {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.25rem;
    }

    .detail-value {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
      word-break: break-all;
    }

    .btn-login {
      display: inline-block;
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.875rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      margin-top: 1rem;
    }

    .btn-login:hover {
      background: var(--primary-hover);
    }

    .note {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-top: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-container">
      <img src="{% static 'images/holbosLOGO.png' %}" alt="Logo" class="logo-img">
      <div class="logo-title">Holbos ERP</div>
      <div class="logo-sub">Parent Portal</div>
    </div>

    <div>
      <svg class="success-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
    </div>

    <h2 style="font-size: 1.25rem; font-weight: 800; margin-bottom: 0.5rem;">Account Found!</h2>
    <p style="font-size: 0.95rem; color: var(--text-muted);">Here are your login credentials. Please keep them safe.</p>

    <div class="details-box">
      <div class="detail-item">
        <div class="detail-label">Unique ID (Username)</div>
        <div class="detail-value">{{ unique_id }}</div>
      </div>
      <div class="detail-item">
        <div class="detail-label">Password</div>
        <div class="detail-value">{{ password }}</div>
      </div>
    </div>

    <a href="{% url 'accounts:parents_login' %}?next={% url 'accounts:change_password' %}" class="btn-login">Sign In</a>

    <p class="note">Once you sign in, you will be prompted to change your temporary password.</p>
  </div>
</body>

</html>
