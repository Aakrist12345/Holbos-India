<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holbos ERP — Reset Password</title>
  <link rel="icon" type="image/png" href="{% static 'images/holbosLOGO.png' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #D4208A;
      --primary-hover: #8B2FC9;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      box-shadow: var(--shadow);
    }

    .logo-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 2rem;
    }

    .logo-img {
      width: 64px;
      height: 64px;
      object-fit: contain;
      margin-bottom: 1rem;
    }

    .logo-title {
      font-family: 'Yatra One', cursive;
      font-size: 2.2rem;
      background: linear-gradient(135deg, #D4208A 0%, #3B2FC9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.72rem;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.5rem 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .field input {
      width: 100%;
      background: #f9fafb;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-family: inherit;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: var(--primary);
      background: #fff;
    }

    .btn-submit {
      width: 100%;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.875rem;
      font-family: inherit;
      font-weight: 800;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .card-footer {
      text-align: center;
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.5rem;
    }

    .card-footer a {
      color: var(--primary);
      font-weight: 700;
      text-decoration: none;
      font-size: 0.88rem;
    }

    .info-text {
      font-size: 0.88rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="logo-container">
      <img src="{% static 'images/holbosLOGO.png' %}" alt="Logo" class="logo-img">
      <div class="logo-title">Holbos ERP</div>
      <div class="logo-sub">Security Check</div>
    </div>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">Reset Password</span>
      <div class="divider-line"></div>
    </div>

    <p class="info-text">Forgotten your password? Enter your email address below, and we'll email instructions for
      setting a new one.</p>

    <form method="POST">
      {% csrf_token %}
      <div class="field">
        <label>Email Address</label>
        {{ form.email }}
      </div>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>

    <div class="card-footer">
      <a href="{% url 'accounts:parents_login' %}">&larr; Back to Login</a>
    </div>
  </div>
</body>

</html>
