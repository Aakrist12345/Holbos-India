services:
  - type: web
    name: holbos-india-1
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn holbos_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: RENDER
        value: true
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.13.0
