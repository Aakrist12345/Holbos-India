<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holbos India — Sign Up</title>
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', Arial, sans-serif;
    background: #0e0612;
    background-image:
        radial-gradient(ellipse 55% 55% at 15% 50%, rgba(120,0,80,0.55) 0%, transparent 65%),
        radial-gradient(ellipse 45% 50% at 85% 50%, rgba(40,10,100,0.6) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(80,0,50,0.4) 0%, transparent 60%);
    overflow-x: hidden;
    padding: 2rem 1rem;
}

body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, rgba(180,0,120,0.15), transparent 70%);
    top: -100px; left: -100px;
    animation: orbFloat 8s ease-in-out infinite;
    pointer-events: none;
}
body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px; border-radius: 50%;
    background: radial-gradient(circle, rgba(80,0,180,0.18), transparent 70%);
    bottom: -80px; right: -80px;
    animation: orbFloat 10s ease-in-out infinite reverse;
    pointer-events: none;
}
@keyframes orbFloat {
    0%,100% { transform: translate(0,0) scale(1); }
    50%      { transform: translate(30px,20px) scale(1.08); }
}

/* Card */
.card {
    width: 440px;
    background: rgba(35,10,45,0.75);
    border: 1px solid rgba(200,80,180,0.2);
    border-radius: 22px;
    padding: 38px 44px 32px;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    box-shadow:
        0 0 0 1px rgba(255,255,255,0.04) inset,
        0 32px 80px rgba(0,0,0,0.7),
        0 0 60px rgba(160,0,120,0.12);
    text-align: center;
    position: relative;
    z-index: 1;
}
.card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(230,80,200,0.6), transparent);
    border-radius: 50%;
}

/* Logo */
.logo-img {
    width: 64px; height: 64px;
    object-fit: contain;
    display: block;
    margin: 0 auto 10px;
    filter: drop-shadow(0 4px 12px rgba(200,0,160,0.45));
}

/* HOLBOS brand */
.brand-title {
    font-family: 'Arial Black', 'Impact', sans-serif;
    font-size: 2.2rem;
    font-weight: 900;
    letter-spacing: 0.12em;
    line-height: 1;
    margin-bottom: 5px;
}
.brand-title span:nth-child(1) { color: #e8006e; }
.brand-title span:nth-child(2) { color: #d4007e; }
.brand-title span:nth-child(3) { color: #b5008e; }
.brand-title span:nth-child(4) { color: #9000a0; }
.brand-title span:nth-child(5) { color: #7000b2; }
.brand-title span:nth-child(6) { color: #5500c8; }

.brand-sub {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(220,180,255,0.5);
    margin-bottom: 20px;
}

/* Steps */
.steps {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
}
.step {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
}
.step-dot {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid rgba(200,100,200,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.68rem; font-weight: 800;
    color: rgba(200,150,220,0.4);
    background: rgba(255,255,255,0.04);
}
.step.active .step-dot {
    background: linear-gradient(135deg, #e8006e, #7000b2);
    border-color: transparent;
    color: white;
    box-shadow: 0 3px 12px rgba(180,0,160,0.5);
}
.step-label {
    font-size: 0.58rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.08em;
    color: rgba(200,150,220,0.35);
}
.step.active .step-label { color: rgba(230,120,220,0.8); }
.step-line {
    width: 36px; height: 1px;
    background: rgba(200,100,200,0.2);
    margin: 0 6px 14px;
}

/* Divider */
.divider {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 20px;
}
.divider-line { flex: 1; height: 1px; background: rgba(200,100,200,0.2); }
.divider-text {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(220,180,255,0.4);
    white-space: nowrap;
}

/* Error box */
.error-box {
    background: rgba(200,40,40,0.12);
    border: 1px solid rgba(255,80,80,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
    text-align: left;
}
.error-text { font-size: 0.82rem; color: #ff8080; font-weight: 500; }

/* Fields */
.field { margin-bottom: 13px; text-align: left; }

.field label {
    display: block;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(220,180,255,0.55);
    margin-bottom: 6px;
}

.input-wrap { position: relative; }

.input-icon {
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.9rem;
    opacity: 0.35; pointer-events: none;
}

.field input {
    width: 100%;
    padding: 12px 13px 12px 38px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(200,100,200,0.2);
    border-radius: 10px;
    color: rgba(255,255,255,0.9);
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
}
.field input::placeholder { color: rgba(255,255,255,0.18); }
.field input:focus {
    border-color: rgba(200,80,200,0.55);
    background: rgba(255,255,255,0.08);
    box-shadow: 0 0 0 3px rgba(180,0,180,0.14);
}

.pwd-toggle {
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,0.28);
    font-size: 0.88rem; cursor: pointer;
    transition: color 0.2s; padding: 4px;
}
.pwd-toggle:hover { color: rgba(255,255,255,0.65); }

/* Strength bar */
.strength-bar { display: flex; gap: 4px; margin-top: 6px; }
.strength-seg {
    flex: 1; height: 3px; border-radius: 3px;
    background: rgba(255,255,255,0.08);
    transition: background 0.3s;
}
.strength-label {
    font-size: 0.65rem; font-weight: 700;
    margin-top: 3px; color: rgba(200,150,220,0.45);
    text-transform: uppercase; letter-spacing: 0.05em;
    min-height: 13px; text-align: left;
}

/* Hints */
.field-hint {
    font-size: 0.68rem; margin-top: 4px;
    min-height: 13px; font-weight: 600; text-align: left;
}

/* Terms */
.terms-row {
    display: flex; align-items: flex-start; gap: 9px;
    margin: 10px 0 4px; text-align: left;
}
.terms-row input[type="checkbox"] {
    width: 15px; height: 15px; flex-shrink: 0;
    margin-top: 2px; cursor: pointer;
    accent-color: #e8006e;
}
.terms-row label {
    font-size: 0.73rem;
    color: rgba(220,180,255,0.45);
    font-weight: 500; line-height: 1.5; cursor: pointer;
}
.terms-row a { color: #e8006e; text-decoration: none; font-weight: 700; }
.terms-row a:hover { color: #ff4aaa; }

/* Submit button */
.btn-signup {
    width: 100%;
    padding: 13px;
    margin-top: 10px;
    background: linear-gradient(90deg, #e8006e, #9000a0, #5500c8);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Inter', Arial, sans-serif;
    font-size: 0.97rem; font-weight: 700;
    letter-spacing: 0.03em;
    cursor: pointer;
    box-shadow: 0 6px 24px rgba(180,0,160,0.45);
    transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
    position: relative; overflow: hidden;
}
.btn-signup::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, rgba(255,255,255,0.12), transparent);
    opacity: 0; transition: opacity 0.2s;
}
.btn-signup:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(180,0,160,0.6); filter: brightness(1.08); }
.btn-signup:hover:not(:disabled)::before { opacity: 1; }
.btn-signup:disabled { opacity: 0.38; cursor: not-allowed; }

/* Perks */
.perks { display: flex; gap: 8px; margin-top: 18px; }
.perk {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(200,80,180,0.15);
    border-radius: 10px;
    padding: 8px 4px;
    text-align: center;
}
.perk-icon { font-size: 1rem; display: block; margin-bottom: 3px; }
.perk-text {
    font-size: 0.58rem; color: rgba(220,180,255,0.4);
    font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.05em; line-height: 1.3;
}

/* Footer */
.card-footer {
    margin-top: 18px;
    font-size: 0.82rem;
    color: rgba(220,180,255,0.4);
    font-weight: 500;
}
.card-footer a { color: #e8006e; font-weight: 700; text-decoration: none; }
.card-footer a:hover { color: #ff4aaa; }

.safe-badge {
    margin-top: 12px;
    font-size: 0.67rem;
    color: rgba(220,180,255,0.28);
    font-weight: 500; letter-spacing: 0.05em;
}

@media (max-width: 480px) {
    .card { width: 100%; padding: 30px 20px 26px; border-radius: 16px; }
    .brand-title { font-size: 1.9rem; }
}
    </style>

    <div class="brand-title">
        <span>H</span><span>O</span><span>L</span><span>B</span><span>O</span><span>S</span>
    </div>
    <p class="brand-sub">Inspiring Future</p>

    <!-- Steps -->
    <div class="steps">
        <div class="step active">
            <div class="step-dot">1</div>
            <div class="step-label">Account</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-dot">2</div>
            <div class="step-label">Verify</div>
        </div>
        <div class="step-line"></div>
        <div class="step">
            <div class="step-dot">3</div>
            <div class="step-label">Learn</div>
        </div>
    </div>

    <!-- Divider -->
    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">Create your account</span>
        <div class="divider-line"></div>
    </div>

    <!-- Django messages -->
    {% if messages %}
      {% for message in messages %}
        <div class="error-box">
          <span>&#9888;&#65039;</span>
          <span class="error-text">{{ message }}</span>
        </div>
      {% endfor %}
    {% endif %}

    <!-- Form -->
    <form method="POST" id="signupForm">
        {% csrf_token %}

        <div class="field">
            <label>Username</label>
            <div class="input-wrap">
                <span class="input-icon">&#128100;</span>
                <input type="text" name="username" id="usernameField"
                       placeholder="Choose a username" required
                       oninput="checkUsername(this)">
            </div>
            <div class="field-hint" id="usernameHint"></div>
        </div>

        <div class="field">
            <label>Email Address</label>
            <div class="input-wrap">
                <span class="input-icon">&#128231;</span>
                <input type="email" name="email" id="emailField"
                       placeholder="your@email.com" required
                       oninput="checkEmail(this)">
            </div>
            <div class="field-hint" id="emailHint"></div>
        </div>

        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <span class="input-icon">&#128274;</span>
                <input type="password" name="password" id="pwdField"
                       placeholder="Create a strong password" required
                       oninput="checkStrength(this.value)">
                <button type="button" class="pwd-toggle" onclick="togglePwd()">&#128065;</button>
            </div>
            <div class="strength-bar">
                <div class="strength-seg" id="s1"></div>
                <div class="strength-seg" id="s2"></div>
                <div class="strength-seg" id="s3"></div>
                <div class="strength-seg" id="s4"></div>
            </div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="terms-row">
            <input type="checkbox" id="terms" onchange="toggleSubmit()">
            <label for="terms">
                I agree to the <a href="#">Terms of Service</a> and
                <a href="#">Privacy Policy</a>. I confirm this account is for a child aged 6&ndash;16.
            </label>
        </div>

        <button type="submit" class="btn-signup" id="submitBtn" disabled>
            Create Account &#128640;
        </button>
    </form>

    <!-- Perks -->
    <div class="perks">
        <div class="perk">
            <span class="perk-icon">&#127358;</span>
            <div class="perk-text">Free Forever</div>
        </div>
        <div class="perk">
            <span class="perk-icon">&#128274;</span>
            <div class="perk-text">100% Safe</div>
        </div>
        <div class="perk">
            <span class="perk-icon">&#128245;</span>
            <div class="perk-text">No Ads Ever</div>
        </div>
    </div>

    <div class="card-footer">
        <p>Already have an account? <a href="{% url 'login' %}">Sign in &rarr;</a></p>
    </div>

    <p class="safe-badge">&#128272; Secure &amp; Safe for Young Learners</p>

</div>

<script>
function togglePwd() {
    var f = document.getElementById('pwdField');
    f.type = f.type === 'password' ? 'text' : 'password';
}

var colors = ['#FF4444','#FF8800','#9000a0','#22CC66'];
var labels = ['Weak','Fair','Good','Strong!'];

function checkStrength(val) {
    var score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    for (var i = 1; i <= 4; i++) {
        document.getElementById('s' + i).style.background =
            i <= score ? colors[score - 1] : 'rgba(255,255,255,0.08)';
    }
    var lbl = document.getElementById('strengthLabel');
    lbl.textContent = val.length > 0 ? (labels[score - 1] || '') : '';
    lbl.style.color = score > 0 ? colors[score - 1] : 'rgba(200,150,220,0.45)';
}

function checkUsername(el) {
    var hint = document.getElementById('usernameHint');
    var v = el.value;
    if (!v.length) { hint.textContent = ''; return; }
    if (v.length < 3) {
        hint.textContent = 'At least 3 characters needed';
        hint.style.color = '#ff6060';
    } else if (/\s/.test(v)) {
        hint.textContent = 'No spaces allowed';
        hint.style.color = '#ff6060';
    } else {
        hint.textContent = 'Looks good!';
        hint.style.color = '#22CC66';
    }
}

function checkEmail(el) {
    var hint = document.getElementById('emailHint');
    var v = el.value;
    if (!v.length) { hint.textContent = ''; return; }
    var valid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    hint.textContent = valid ? 'Valid email' : 'Enter a valid email address';
    hint.style.color = valid ? '#22CC66' : '#ff6060';
}

function toggleSubmit() {
    document.getElementById('submitBtn').disabled =
        !document.getElementById('terms').checked;
}
</script>
</body>
</html>
