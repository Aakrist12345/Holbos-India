<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holbos — Parent Login</title>
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#C4188E;--purple:#5B2FC9;
  --grad:linear-gradient(135deg,#C4188E 0%,#7B35C9 50%,#5B2FC9 100%);
  --deep:#0D0814;--card:rgba(255,255,255,0.04);
  --border:rgba(180,80,200,0.22);--text:#F0EAFF;
  --muted:rgba(240,234,255,0.5);--ease:cubic-bezier(.23,1,.32,1);
}
html,body{height:100%;font-family:'Plus Jakarta Sans',sans-serif;background:var(--deep);color:var(--text);overflow:hidden}
.bg{position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 65% 55% at 15% 50%,rgba(196,24,142,.18) 0%,transparent 55%),
  radial-gradient(ellipse 55% 55% at 85% 50%,rgba(91,47,201,.18) 0%,transparent 55%),
  radial-gradient(ellipse 40% 40% at 50% 100%,rgba(123,53,201,.12) 0%,transparent 60%),
  var(--deep)}
.rings{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0}
.ring{position:absolute;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring:nth-child(1){width:280px;height:280px;border:1px solid rgba(196,24,142,.1);animation:spin 20s linear infinite}
.ring:nth-child(2){width:500px;height:500px;border:1px dashed rgba(91,47,201,.08);animation:spin 35s linear infinite reverse}
.ring:nth-child(3){width:720px;height:720px;border:1px solid rgba(123,53,201,.06);animation:spin 55s linear infinite}
.ring:nth-child(4){width:980px;height:980px;border:1px dotted rgba(196,24,142,.04);animation:spin 75s linear infinite reverse}
@keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;opacity:0;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.5}90%{opacity:.15}100%{transform:translateY(-10vh) scale(1);opacity:0}}
.page{position:relative;z-index:1;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem}
.card{width:100%;max-width:430px;background:var(--card);border:1px solid var(--border);border-radius:28px;padding:2.75rem 2.5rem;backdrop-filter:blur(28px);box-shadow:0 30px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04) inset,0 1px 0 rgba(255,255,255,.07) inset;animation:cardIn .9s var(--ease) both;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(196,24,142,.6),rgba(91,47,201,.6),transparent)}
.card::after{content:'';position:absolute;inset:0;border-radius:28px;background:linear-gradient(135deg,rgba(196,24,142,.07) 0%,rgba(91,47,201,.05) 100%);pointer-events:none}
@keyframes cardIn{from{opacity:0;transform:translateY(32px) scale(.97)}to{opacity:1;transform:none}}
.logo-wrap{text-align:center;margin:.5rem 0 1.8rem;display:flex;flex-direction:column;align-items:center;gap:12px;animation:fadeUp .8s .1s var(--ease) both}
.logo-img{width:90px;height:auto;object-fit:contain;display:block;filter:drop-shadow(0 8px 25px rgba(196,24,142,.4));transition:transform .3s ease}
.logo-img:hover{transform:scale(1.05)}
.logo-title{font-family:'Yatra One',cursive;font-size:3rem;font-weight:400;letter-spacing:.02em;line-height:1;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-sub{font-size:.65rem;color:var(--muted);font-weight:600;letter-spacing:.3em;text-transform:uppercase}
.parent-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(91,47,201,.15);border:1px solid rgba(91,47,201,.4);border-radius:50px;padding:.28rem .85rem;font-size:.7rem;font-weight:800;color:rgba(200,180,255,.9);letter-spacing:.08em;text-transform:uppercase}
.parent-badge-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,#C4188E,#5B2FC9)}
.access-info{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1rem 0 1.6rem;animation:fadeUp .8s .15s var(--ease) both}
.access-pill{display:inline-flex;align-items:center;gap:5px;font-size:.64rem;font-weight:700;letter-spacing:.06em;padding:.22rem .7rem;border-radius:50px}
.access-pill.can{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.28);color:#86EFAC}
.access-pill.cannot{background:rgba(239,68,68,.09);border:1px solid rgba(239,68,68,.25);color:#FCA5A5;text-decoration:line-through;opacity:.7}
.divider{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;animation:fadeUp .8s .2s var(--ease) both}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-text{font-size:.72rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;white-space:nowrap}
.error-box{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.25);border-radius:12px;padding:.75rem 1rem;margin-bottom:1.25rem;display:flex;align-items:flex-start;gap:8px;animation:shake .4s var(--ease)}
.error-text{font-size:.82rem;color:#FF7070;font-weight:600;line-height:1.5}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
form{animation:fadeUp .8s .25s var(--ease) both}
.field{margin-bottom:1rem;position:relative}
.field label{display:block;font-size:.73rem;font-weight:800;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:.45rem}
.input-wrap{position:relative}
.input-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);font-size:.95rem;pointer-events:none;opacity:.45;transition:opacity .2s;z-index:1}
.field input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:.82rem 1rem .82rem 2.8rem;color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;font-size:.92rem;outline:none;transition:border-color .25s,box-shadow .25s,background .25s}
.field input::placeholder{color:rgba(240,234,255,.22)}
.field input:focus{border-color:var(--pink);background:rgba(196,24,142,.06);box-shadow:0 0 0 3px rgba(196,24,142,.15)}
.input-wrap:focus-within .input-icon{opacity:.9}
.pwd-toggle{position:absolute;right:.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:.88rem;cursor:pointer;padding:4px;z-index:1;transition:color .2s}
.pwd-toggle:hover{color:var(--pink)}
.btn-login{width:100%;margin-top:.6rem;background:var(--grad);color:#fff;border:none;border-radius:12px;padding:.92rem;font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:.95rem;letter-spacing:.04em;cursor:pointer;box-shadow:0 6px 24px rgba(196,24,142,.45);transition:transform .25s var(--ease),box-shadow .25s;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden}
.btn-login::after{content:'';position:absolute;inset:0;background:rgba(255,255,255,0);transition:background .2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(196,24,142,.6)}
.btn-login:hover::after{background:rgba(255,255,255,.08)}
.btn-login:active{transform:translateY(0)}
.safe-badge{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:1.4rem;font-size:.7rem;color:rgba(240,234,255,.28);font-weight:600;letter-spacing:.05em;animation:fadeUp .8s .5s var(--ease) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
</style>
</head>

<script>
const colors=['#C4188E','#7B35C9','#5B2FC9','#A020A0'];
const container=document.getElementById('particles');
for(let i=0;i<22;i++){
  const p=document.createElement('div');
  p.className='particle';
  const size=Math.random()*5+2,color=colors[Math.floor(Math.random()*colors.length)];
  p.style.cssText='width:'+size+'px;height:'+size+'px;left:'+(Math.random()*100)+'%;background:'+color+';animation-duration:'+(9+Math.random()*14)+'s;animation-delay:'+(Math.random()*12)+'s;';
  container.appendChild(p);
}
function togglePwd(){const f=document.getElementById('password');f.type=f.type==='password'?'text':'password'}

// Demo credentials — in production replace with real Django auth
const USERS={
  'parent1':{password:'holbos123',name:'Priya Sharma',child:'Aarav Sharma',grade:'Grade 3'},
  'parent2':{password:'holbos456',name:'Rahul Verma',child:'Ishaan Verma',grade:'Grade 4'},
  'demo':{password:'demo',name:'Demo Parent',child:'Demo Child',grade:'Grade 2'}
};

document.getElementById('loginForm').addEventListener('submit',function(e){
  e.preventDefault();
  const u=document.getElementById('username').value.trim();
  const p=document.getElementById('password').value;
  const eb=document.getElementById('errorBox');
  const em=document.getElementById('errorMsg');
  if(USERS[u]&&USERS[u].password===p){
    sessionStorage.setItem('holbos_user',JSON.stringify({username:u,...USERS[u]}));
    window.location.href='parent_dashboard.html';
  }else{
    eb.style.display='flex';
    em.textContent='Invalid username or password. Try: demo / demo';
    eb.style.animation='none';
    eb.offsetHeight;
    eb.style.animation='';
  }
});
</script>
