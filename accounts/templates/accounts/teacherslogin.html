<!DOCTYPE html>
<html lang="en">
{% load static %}

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holbos — Parent Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --primary: #1e3a8a;
      --primary-hover: #1e40af;
      --primary-light: #3b82f6;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --error: #ef4444;
      --success: #10b981;
      --ease: cubic-bezier(.23, 1, .32, 1);
    }

    html,
    body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.75rem 2.5rem;
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
      animation: cardIn .5s var(--ease) both;
      position: relative
    }

    @keyframes cardIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .logo-wrap {
      text-align: center;
      margin: .5rem 0 1.8rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px
    }

    .logo-img {
      width: 80px;
      height: 80px;
      object-fit: contain;
      border: none;
      border-radius: 16px;
      background: transparent;
      display: block;
      transition: transform .3s ease
    }

    .logo-img:hover {
      transform: scale(1.05)
    }

    .logo-title {
      font-family: 'Yatra One', cursive;
      font-size: 2.5rem;
      font-weight: 400;
      letter-spacing: .02em;
      line-height: 1;
      background: linear-gradient(135deg, #D4208A 0%, #3B2FC9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: .7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .25em;
      text-transform: uppercase
    }

    .parent-portal-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      border-radius: 4px;
      padding: .28rem .85rem;
      font-size: .7rem;
      font-weight: 800;
      color: var(--primary-light);
      letter-spacing: .08em;
      text-transform: uppercase
    }

    .access-info {
      display: flex;
      gap: .5rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1rem 0 1.6rem
    }

    .access-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: .64rem;
      font-weight: 700;
      letter-spacing: .06em;
      padding: .22rem .7rem;
      border-radius: 4px
    }

    .access-pill.can {
      background: #f0fdf4;
      border: 1px solid #dcfce7;
      color: #15803d
    }

    .access-pill.cannot {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      color: #b91c1c;
      text-decoration: line-through;
      opacity: .7
    }

    .divider {
      display: flex;
      align-items: center;
      gap: .75rem;
      margin-bottom: 1.5rem
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    .divider-text {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      white-space: nowrap
    }

    .error-box {
      background: #fef2f2;
      border: 1px solid #fee2e2;
      border-radius: 8px;
      padding: .75rem 1rem;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: flex-start;
      gap: 8px
    }

    .error-text {
      font-size: .82rem;
      color: var(--error);
      font-weight: 600;
      line-height: 1.5
    }

    .field {
      margin-bottom: 1.25rem;
      position: relative
    }

    .field label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .02em;
      margin-bottom: .5rem
    }

    .input-wrap {
      position: relative
    }

    .input-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: .95rem;
      pointer-events: none;
      opacity: .4;
      transition: opacity .2s;
      z-index: 1
    }

    .field input {
      width: 100%;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .82rem 1rem .82rem 2.8rem;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: .92rem;
      outline: none;
      transition: all .15s
    }

    .field input::placeholder {
      color: #94a3b8
    }

    .field input:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1)
    }

    .pwd-toggle {
      position: absolute;
      right: .9rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: .88rem;
      cursor: pointer;
      padding: 4px;
      z-index: 1
    }

    .btn-login {
      width: 100%;
      margin-top: .6rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: .92rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: .95rem;
      letter-spacing: .02em;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px
    }

    .btn-login:hover {
      background: #172554
    }

    .btn-login:active {
      transform: scale(0.98)
    }

    .safe-badge {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 1.4rem;
      font-size: .7rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: .05em
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="card">
      <div class="logo-wrap">
        <img src="{% static 'images/holbosLOGO.png' %}" alt="Holbos Logo" class="logo-img">
        <div class="logo-title">Holbos</div>
        <div class="logo-sub">Inspiring Future</div>
        <div class="parent-portal-tag">Parent Portal</div>
      </div>
      <div class="access-info">
        <span class="access-pill can">View Attendance</span>
        <span class="access-pill can">View Progress</span>
        <span class="access-pill can">View Content</span>
        <span class="access-pill cannot">Mark Attendance</span>
      </div>
      <div class="divider">
        <div class="divider-line"></div><span class="divider-text">Sign in to Portal</span>
        <div class="divider-line"></div>
      </div>
      <div id="errorBox" style="display:none" class="error-box">
        <span class="error-text" id="errorMsg">Invalid username or password.</span>
      </div>
      <form id="loginForm">
        <div class="field">
          <label>Parent Username</label>
          <div class="input-wrap">
            <input type="text" id="username" placeholder="Enter your username" required autocomplete="username">
          </div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" required
              autocomplete="current-password">
            <button type="button" class="pwd-toggle" onclick="togglePwd()">Show</button>
          </div>
        </div>
        <button type="submit" class="btn-login">Sign In</button>
      </form>
      <div class="safe-badge">Secure Read-Only Access</div>
    </div>
  </div>
  <script>
    function togglePwd() { const f = document.getElementById('password'); const b = event.target; if (f.type === 'password') { f.type = 'text'; b.textContent = 'Hide' } else { f.type = 'password'; b.textContent = 'Show' } }

    const USERS = {
      'parent1': { password: 'holbos123' },
      'demo': { password: 'demo' }
    };

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;
      const eb = document.getElementById('errorBox');
      const em = document.getElementById('errorMsg');
      if (USERS[u] && USERS[u].password === p) {
        window.location.href = 'dashboard.html';
      } else {
        eb.style.display = 'flex';
        em.textContent = 'Invalid credentials. Try: demo / demo';
      }
    });
  </script>
</body>

</html>
