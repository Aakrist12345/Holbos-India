<!DOCTYPE html>
<html lang="en">

<head>
  {% load static %}
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Holbos ERP — Reset Sent</title>
  <link rel="icon" type="image/png" href="{% static 'images/holbosLOGO.png' %}">
  <link
    href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #D4208A;
      --bg: #f8fafc;
      --surface: #ffffff;
      --text: #1e293b;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 1.5rem;
    }

    .card {
      width: 100%;
      max-width: 440px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow);
      text-align: center;
    }

    .status-icon {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      display: block;
    }

    .title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .desc {
      font-size: 0.95rem;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-return {
      display: inline-block;
      background: var(--primary);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      padding: 0.85rem 2rem;
      font-weight: 800;
      font-size: 0.9rem;
      transition: transform 0.2s;
    }

    .btn-return:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="card">
    <span class="status-icon">✉️</span>
    <h1 class="title">Email Sent!</h1>
    <p class="desc">We've emailed you instructions for setting your password, if an account exists with the email you
      entered. You should receive them shortly.</p>
    <p class="desc" style="font-size: 0.8rem; opacity: 0.8;">If you don't see it within a few minutes, please check your
      <strong>spam folder</strong>.
    </p>
    <a href="{% url 'accounts:parents_login' %}" class="btn-return">Return to Login</a>
  </div>
</body>

</html>
