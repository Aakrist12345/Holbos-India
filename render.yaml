services:
  - type: web
    name: holbos-project
    env: python
    region: oregon
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn holbos_project.wsgi:application
    envVars:
      - key: SECRET_KEY
        scope: run
        value: ${SECRET_KEY}
      - key: DEBUG
        value: False
      - key: ALLOWED_HOSTS
        value: ${RENDER_EXTERNAL_HOSTNAME}
      - key: DATABASE_URL
        fromDatabase:
          name: holbos-db
          property: connectionString

databases:
  - name: holbos-db
    engine: postgres
    version: 15
    plan: free
    initialDatabase: holbos
