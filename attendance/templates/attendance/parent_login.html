{% extends "attendance/base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto; padding: 2rem; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); text-align: center;">
    <h2 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 800; color: #1e293b; margin-bottom: 0.5rem;">Parent Login</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 2rem;">Access the Holbos India Attendance Portal</p>
    
    <form method="post" action="{% url 'accounts:parents_login' %}">
        {% csrf_token %}
        <div style="text-align: left; margin-bottom: 1.25rem;">
            <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">Username</label>
            <input type="text" name="username" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.75rem 1rem; font-family: inherit;" placeholder="Enter username">
        </div>
        <div style="text-align: left; margin-bottom: 2rem;">
            <label style="display: block; font-size: 0.75rem; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem;">Password</label>
            <input type="password" name="password" style="width: 100%; border: 1px solid #e2e8f0; border-radius: 8px; padding: 0.75rem 1rem; font-family: inherit;" placeholder="Enter password">
        </div>
        <button type="submit" style="width: 100%; background: #2563eb; color: #fff; border: none; border-radius: 8px; padding: 0.85rem; font-weight: 700; cursor: pointer; transition: background 0.2s;">Login to Portal</button>
    </form>
</div>
{% endblock %}
